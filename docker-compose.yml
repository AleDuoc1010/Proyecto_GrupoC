version: '3.8'

services:
  # 1. Contenedor de la Base de Datos Global
  mysql-db:
    build:
      context: ./Db  # Apunta a la carpeta donde está tu Dockerfile de MySQL y el init.sql
    container_name: sanos_salvos_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: stefy
    volumes:
      - mysql_data:/var/lib/mysql # Guarda los datos para que no se borren si apagas el contenedor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pstefy"]
      timeout: 20s
      retries: 10

  # 2. Contenedor del Microservicio de Usuarios
  usuarios-api:
    build:
      context: ./Backend/usuarios # Apunta a la carpeta de tu API
    container_name: api_usuarios
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy # Espera a que MySQL esté 100% listo antes de encender Spring Boot
    environment:
      - DB_HOST=mysql-db # ¡Magia de Docker! Usa el nombre del contenedor como IP
      - DB_PORT=3306
      - DB_NAME=usuariosdb
      - DB_USER=root
      - DB_PASSWORD=stefy
      - JWT_SECRET_KEY=UHJveWVjdG9HcnVwb0NTYW5vc1lTYWx2b3NTZWNyZXRLZXkyMDI2ISE=
      - JWT_EXPIRATION_MS=86400000

volumes:
  mysql_data: