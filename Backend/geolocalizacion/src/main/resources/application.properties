# Configuración del Servidor
server.port=8082

# Configuración de la Base de Datos (Usa variables de entorno)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:geolocalizaciondb}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:stefy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de logs para ver errores de coordenadas
logging.level.org.springframework.web=INFO
logging.level.grupoC.geolocalizacion=DEBUG
jwt.secret=${JWT_SECRET_KEY}